<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Partner Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F0F6FF; --surface:#fff; --surface2:#E6F1FB;
    --border:#B5D4F4; --navy:#0C447C; --blue:#378ADD;
    --text:#1a1a2e; --muted:#6688aa; --red:#ef4444;
    --kakao:#FEE500; --kakao-text:#191919;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(55,138,221,0.08) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(12,68,124,0.06) 0%,transparent 55%);pointer-events:none;z-index:0;}

  .topbar{background:var(--navy);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
  .logo{display:flex;align-items:center;gap:4px;cursor:pointer;}
  .lp1{font-size:16px;font-weight:900;color:#fff;}
  .ld{width:5px;height:5px;border-radius:50%;display:inline-block;margin:0 1px 2px;}
  .ld1{background:#fff;} .ld2{background:#85B7EB;}
  .lp2{font-size:16px;font-weight:900;color:#85B7EB;}
  .topbar-right{font-size:13px;color:rgba(255,255,255,0.65);}
  .topbar-right a{color:#85B7EB;text-decoration:none;font-weight:700;margin-left:6px;}
  .topbar-right a:hover{text-decoration:underline;}

  .container{width:100%;max-width:460px;margin:0 auto;padding:64px 24px 80px;position:relative;z-index:1;flex:1;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 4px 24px rgba(12,68,124,0.07);position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--blue));}

  .card-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);margin-bottom:6px;}
  .card-sub{font-size:13px;color:var(--muted);margin-bottom:26px;line-height:1.7;}

  .login-stack{display:grid;gap:10px;margin-bottom:18px;}
  .btn-social,.btn-primary{width:100%;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn-social{border:1.5px solid var(--border);background:#fff;color:var(--text);}
  .btn-social:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(12,68,124,0.1);}
  .btn-kakao{background:var(--kakao);border-color:var(--kakao);color:var(--kakao-text);}
  .btn-google:hover{border-color:#4285F4;box-shadow:0 2px 12px rgba(66,133,244,0.15);}

  .divider{display:flex;align-items:center;gap:12px;margin:20px 0 18px;color:var(--muted);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:7px;}
  .field input{width:100%;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
  .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,0.12);}
  .field-err{font-size:11px;color:var(--red);margin-top:4px;min-height:16px;}

  .btn-primary{border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;box-shadow:0 4px 20px rgba(12,68,124,0.25);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(12,68,124,0.3);}
  .btn-primary:disabled,.btn-social:disabled{opacity:0.6;cursor:default;transform:none;}

  .err-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none;line-height:1.6;}
  .ok-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;font-size:13px;color:#1e40af;margin-bottom:14px;display:none;line-height:1.6;}
  .forgot{text-align:right;margin-top:-8px;margin-bottom:16px;}
  .forgot a{font-size:12px;color:var(--muted);text-decoration:none;}
  .forgot a:hover{color:var(--blue);text-decoration:underline;}
  .bottom-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
  .bottom-link a{color:var(--blue);font-weight:700;text-decoration:none;margin-left:4px;}
  .bottom-link a:hover{text-decoration:underline;}
  .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
  .spinner.dark{border-color:rgba(25,25,25,0.25);border-top-color:#191919;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:520px) {
    .topbar{padding:13px 18px;}
    .topbar-right{font-size:12px;}
    .container{padding:40px 18px 64px;}
    .card{padding:32px 24px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="location.href='partnerpool.html'">
    <span class="lp1">Partner</span>
    <span class="ld ld1"></span><span class="ld ld2"></span>
    <span class="lp2">Pool</span>
  </div>
  <div class="topbar-right">계정이 없으신가요? <a href="#" onclick="goSignup()">회원가입</a></div>
</div>

<main class="container">
  <section class="card">
    <div class="card-title">로그인</div>
    <div class="card-sub">Partner Pool에 오신 것을 환영합니다.</div>

    <div class="err-box" id="errBox"></div>
    <div class="ok-box" id="okBox"></div>

    <div class="login-stack">
      <button class="btn-social btn-kakao" id="kakaoBtn" onclick="loginWithKakao()">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#191919" d="M12 3C6.48 3 2 6.55 2 10.93c0 2.84 1.89 5.33 4.73 6.73l-.84 3.07c-.08.3.26.53.51.35l3.69-2.45c.62.09 1.26.14 1.91.14 5.52 0 10-3.55 10-7.93S17.52 3 12 3z"/>
        </svg>
        카카오로 계속하기
      </button>

      <button class="btn-social btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google로 계속하기
      </button>
    </div>

    <div class="divider">또는 이메일로 로그인</div>

    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="example@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')loginWithEmail()">
      <div class="field-err" id="emailErr"></div>
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')loginWithEmail()">
      <div class="field-err" id="pwErr"></div>
    </div>
    <div class="forgot"><a href="#" onclick="resetPw()">비밀번호를 잊으셨나요?</a></div>

    <button class="btn-primary" id="loginBtn" onclick="loginWithEmail()">로그인</button>
  </section>

  <div class="bottom-link">
    계정이 없으신가요? <a href="#" onclick="goSignup()">회원가입하기 →</a>
  </div>
</main>

<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const params = new URLSearchParams(location.search);
const dest = params.get('dest');

const KAKAO_JAVASCRIPT_KEY = '4e83c1cca4704d79158751380a022925';

const firebaseConfig = {
  apiKey:            "AIzaSyCS1eNwLvUikT1HAw1sBRkqiZrYTMPInRM",
  authDomain:        "partenrpool-2026.firebaseapp.com",
  projectId:         "partenrpool-2026",
  storageBucket:     "partenrpool-2026.firebasestorage.app",
  messagingSenderId: "47486097497",
  appId:             "1:47486097497:web:893f6b154a7f86cbd6b948",
  measurementId:     "G-RLV36KR76Y"
};

try {
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  window.fbAuth = firebase.auth();
  window.GoogleAuthProvider = firebase.auth.GoogleAuthProvider;
} catch(e) {
  console.warn('Firebase 연결 실패', e);
}

try {
  if (window.Kakao && !Kakao.isInitialized() && !KAKAO_JAVASCRIPT_KEY.startsWith('YOUR_')) {
    Kakao.init(KAKAO_JAVASCRIPT_KEY);
  }
} catch(e) {
  console.warn('Kakao SDK 초기화 실패', e);
}

function getDestUrl() {
  if (dest === 'club') return '학생단체 등록.html';
  if (dest === 'corp') return '기업 등록.html';
  return 'partnerpool.html';
}

function goSignup() {
  location.href = '회원가입.html' + (dest ? '?dest=' + encodeURIComponent(dest) : '');
}

function goDestination() {
  location.href = getDestUrl();
}

function v(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearErr() {
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('emailErr').textContent = '';
  document.getElementById('pwErr').textContent = '';
}

function showOk(msg) {
  const el = document.getElementById('okBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function setButtonLoading(btnId, on, text, darkSpinner=false) {
  const btn = document.getElementById(btnId);
  if (!btn.dataset.orig) btn.dataset.orig = btn.innerHTML;
  btn.disabled = on;
  btn.innerHTML = on ? `<span class="spinner ${darkSpinner ? 'dark' : ''}"></span>${text}` : btn.dataset.orig;
}

function loginWithKakao() {
  clearErr();
  if (!window.Kakao) {
    showErr('카카오 SDK를 불러오지 못했습니다. 네트워크 상태를 확인해주세요.');
    return;
  }
  if (KAKAO_JAVASCRIPT_KEY.startsWith('YOUR_')) {
    showErr('KAKAO_JAVASCRIPT_KEY에 카카오 개발자 콘솔의 JavaScript 키를 입력해주세요.');
    return;
  }
  if (!Kakao.isInitialized()) Kakao.init(KAKAO_JAVASCRIPT_KEY);

  setButtonLoading('kakaoBtn', true, '카카오 확인 중...', true);
  Kakao.Auth.login({
    scope: 'profile_nickname,account_email',
    success: function() {
      Kakao.API.request({
        url: '/v2/user/me',
        success: function(res) {
          const kakaoAccount = res.kakao_account || {};
          const profile = kakaoAccount.profile || {};

          sessionStorage.setItem('pp_kakao_login', 'true');
          sessionStorage.setItem('pp_kakao_id', String(res.id || ''));
          sessionStorage.setItem('pp_kakao_email', kakaoAccount.email || '');
          sessionStorage.setItem('pp_kakao_name', profile.nickname || '');

          goDestination();
        },
        fail: function(error) {
          setButtonLoading('kakaoBtn', false);
          showErr('카카오 사용자 정보를 가져오지 못했습니다.');
          console.warn(error);
        }
      });
    },
    fail: function(error) {
      setButtonLoading('kakaoBtn', false);
      showErr('카카오 로그인에 실패했습니다.');
      console.warn(error);
    }
  });
}

function loginWithGoogle() {
  clearErr();
  if (window.fbAuth && window.GoogleAuthProvider) {
    const provider = new window.GoogleAuthProvider();
    window.fbAuth.signInWithPopup(provider)
      .then(() => goDestination())
      .catch(e => showErr('Google 로그인 실패: ' + e.message));
  } else {
    goDestination();
  }
}

function loginWithEmail() {
  clearErr();
  const email = v('email');
  const pw = v('password');
  if (!email) {
    document.getElementById('emailErr').textContent = '이메일을 입력해주세요.';
    return;
  }
  if (!pw) {
    document.getElementById('pwErr').textContent = '비밀번호를 입력해주세요.';
    return;
  }

  setButtonLoading('loginBtn', true, '로그인 중...');
  if (window.fbAuth) {
    window.fbAuth.signInWithEmailAndPassword(email, pw)
      .then(() => goDestination())
      .catch(e => {
        setButtonLoading('loginBtn', false);
        const msgs = {
          'auth/user-not-found':'등록되지 않은 이메일입니다.',
          'auth/wrong-password':'비밀번호가 올바르지 않습니다.',
          'auth/invalid-email':'올바른 이메일 형식이 아닙니다.',
          'auth/too-many-requests':'너무 많은 시도입니다. 잠시 후 다시 시도해주세요.',
          'auth/invalid-credential':'이메일 또는 비밀번호를 확인해주세요.'
        };
        showErr(msgs[e.code] || '로그인 중 오류: ' + e.message);
      });
  } else {
    setTimeout(() => goDestination(), 500);
  }
}

function resetPw() {
  clearErr();
  const email = v('email');
  if (!email) {
    document.getElementById('emailErr').textContent = '이메일을 먼저 입력해주세요.';
    return;
  }
  if (window.fbAuth) {
    window.fbAuth.sendPasswordResetEmail(email)
      .then(() => showOk('비밀번호 재설정 이메일을 발송했습니다.'))
      .catch(() => showErr('이메일 전송에 실패했습니다. 이메일을 확인해주세요.'));
  } else {
    showErr('Firebase 연결 후 사용할 수 있습니다.');
  }
}

if (window.fbAuth) {
  window.fbAuth.onAuthStateChanged(user => {
    if (user && !params.get('code')) goDestination();
  });
}
</script>
</body>
</html>
