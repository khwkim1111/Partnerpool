<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Partner Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F0F6FF; --surface:#fff; --surface2:#E6F1FB;
    --border:#B5D4F4; --navy:#0C447C; --blue:#378ADD;
    --text:#1a1a2e; --muted:#6688aa; --red:#ef4444;
    --green:#16a34a; --green-bg:#dcfce7;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(55,138,221,0.08) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(12,68,124,0.06) 0%,transparent 55%);pointer-events:none;z-index:0;}

  /* 상단 바 */
  .topbar{background:var(--navy);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
  .logo{display:flex;align-items:center;gap:4px;cursor:pointer;}
  .lp1{font-size:16px;font-weight:900;color:#fff;}
  .ld{width:5px;height:5px;border-radius:50%;display:inline-block;margin:0 1px 2px;}
  .ld1{background:#fff;} .ld2{background:#85B7EB;}
  .lp2{font-size:16px;font-weight:900;color:#85B7EB;}
  .topbar-right{font-size:13px;color:rgba(255,255,255,0.65);}
  .topbar-right a{color:#85B7EB;text-decoration:none;font-weight:700;margin-left:6px;}
  .topbar-right a:hover{text-decoration:underline;}

  /* 스텝 인디케이터 */
  .step-wrap{display:flex;align-items:center;justify-content:center;padding:32px 0 6px;position:relative;z-index:1;}
  .step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);transition:all 0.35s;}
  .step-dot.active{border-color:var(--blue);color:var(--blue);box-shadow:0 0 0 4px rgba(55,138,221,0.15);}
  .step-dot.done{background:var(--blue);border-color:var(--blue);color:#fff;}
  .step-line{width:52px;height:2px;background:var(--border);transition:background 0.35s;}
  .step-line.done{background:var(--blue);}
  .step-labels{display:flex;justify-content:center;padding:8px 0 0;position:relative;z-index:1;}
  .step-lbl{font-size:11px;color:var(--muted);text-align:center;width:80px;transition:color 0.3s;}
  .step-lbl.active{color:var(--blue);font-weight:700;}

  /* 컨테이너 */
  .container{max-width:460px;margin:0 auto;padding:28px 24px 80px;position:relative;z-index:1;flex:1;}

  /* 카드 */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 4px 24px rgba(12,68,124,0.07);position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--blue));}

  /* 섹션 전환 */
  .screen{display:none;}
  .screen.active{display:block;animation:fadeUp 0.4s ease both;}

  .card-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:6px;}
  .card-sub{font-size:13px;color:var(--muted);margin-bottom:26px;line-height:1.7;}

  /* 구글 */
  .btn-google{width:100%;padding:13px 20px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;}
  .btn-google:hover{border-color:#4285F4;box-shadow:0 2px 12px rgba(66,133,244,0.15);}

  .divider{display:flex;align-items:center;gap:12px;margin-bottom:18px;color:var(--muted);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  /* 폼 */
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:7px;}
  .field input{width:100%;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
  .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,0.12);}
  .field input.err{border-color:var(--red);}
  .field-err{font-size:11px;color:var(--red);margin-top:4px;min-height:16px;}

  /* 전화번호 입력 */
  .phone-wrap{display:flex;gap:8px;}
  .phone-prefix{padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--muted);white-space:nowrap;flex-shrink:0;font-weight:600;}
  .phone-wrap input{flex:1;}

  /* OTP 입력 */
  .otp-wrap{display:flex;gap:10px;justify-content:center;margin:10px 0 20px;}
  .otp-input{width:48px;height:56px;text-align:center;font-size:22px;font-weight:700;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--navy);outline:none;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
  .otp-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,0.12);}
  .otp-input.filled{border-color:var(--navy);background:rgba(12,68,124,0.05);}

  /* 인증 타이머 */
  .timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-size:13px;}
  .timer{color:var(--red);font-weight:700;font-variant-numeric:tabular-nums;}
  .resend-btn{background:none;border:none;color:var(--blue);font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:underline;}
  .resend-btn:disabled{color:var(--muted);text-decoration:none;cursor:default;}

  /* 전송 완료 뱃지 */
  .sms-sent-badge{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;font-size:13px;color:#1e40af;margin-bottom:18px;display:flex;align-items:center;gap:8px;}

  /* 버튼 */
  .btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 20px rgba(12,68,124,0.25);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(12,68,124,0.3);}
  .btn-primary:disabled{opacity:0.6;cursor:default;transform:none;}
  .btn-back{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:10px;transition:all 0.2s;}
  .btn-back:hover{border-color:var(--blue);color:var(--navy);}

  /* 에러 박스 */
  .err-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none;}

  /* 완료 */
  .success-wrap{text-align:center;padding:12px 0;}
  .success-icon{font-size:64px;margin-bottom:16px;animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
  .success-title{font-family:'DM Serif Display',serif;font-size:24px;background:linear-gradient(135deg,var(--navy),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
  .success-sub{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px;}
  .verified-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);border:1px solid #86efac;padding:6px 16px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:22px;}

  .bottom-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
  .bottom-link a{color:var(--blue);font-weight:700;text-decoration:none;margin-left:4px;}
  .bottom-link a:hover{text-decoration:underline;}

  .forgot{text-align:right;margin-top:-8px;margin-bottom:16px;}
  .forgot a{font-size:12px;color:var(--muted);text-decoration:none;}
  .forgot a:hover{color:var(--blue);text-decoration:underline;}

  .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}

  /* reCAPTCHA 숨김 처리 */
  #recaptcha-container .grecaptcha-badge { visibility: hidden; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="location.href='partnerpool.html'">
    <span class="lp1">Partner</span>
    <span class="ld ld1"></span><span class="ld ld2"></span>
    <span class="lp2">Pool</span>
  </div>
  <div class="topbar-right">계정이 없으신가요? <a href="#" onclick="goSignup()">회원가입</a></div>
</div>

<!-- 스텝 인디케이터 -->
<div class="step-wrap">
  <div class="step-dot active" id="sd1">1</div>
  <div class="step-line" id="sl1"></div>
  <div class="step-dot" id="sd2">2</div>
  <div class="step-line" id="sl2"></div>
  <div class="step-dot" id="sd3">✓</div>
</div>
<div class="step-labels">
  <div class="step-lbl active" id="slb1">로그인</div>
  <div class="step-lbl" id="slb2">전화 인증</div>
  <div class="step-lbl" id="slb3">완료</div>
</div>

<div class="container">
  <div class="card">

    <!-- ── STEP 1: 로그인 ── -->
    <div class="screen active" id="screen1">
      <div class="card-title">로그인</div>
      <div class="card-sub">Partner Pool에 오신 것을 환영합니다.</div>

      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google로 계속하기
      </button>

      <div class="divider">또는 이메일로 로그인</div>

      <div class="err-box" id="errBox1"></div>

      <div class="field">
        <label>이메일</label>
        <input type="email" id="email" placeholder="example@email.com" onkeydown="if(event.key==='Enter')login()">
        <div class="field-err" id="emailErr"></div>
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
        <div class="field-err" id="pwErr"></div>
      </div>
      <div class="forgot"><a href="#" onclick="resetPw()">비밀번호를 잊으셨나요?</a></div>

      <button class="btn-primary" id="loginBtn" onclick="login()">로그인</button>
    </div>

    <!-- ── STEP 2: 전화 인증 ── -->
    <div class="screen" id="screen2">
      <div class="card-title">📱 본인 인증</div>
      <div class="card-sub">보안을 위해 휴대폰 번호로 본인 인증을 진행합니다.</div>

      <div class="err-box" id="errBox2"></div>

      <!-- 전화번호 입력 -->
      <div id="phoneInputArea">
        <div class="field">
          <label>휴대폰 번호</label>
          <div class="phone-wrap">
            <div class="phone-prefix">🇰🇷 +82</div>
            <input type="tel" id="phoneNum" placeholder="010-0000-0000" maxlength="13"
              oninput="formatPhone(this)" onkeydown="if(event.key==='Enter')sendSms()">
          </div>
          <div class="field-err" id="phoneErr"></div>
        </div>
        <!-- reCAPTCHA 컨테이너 (Firebase 필요) -->
        <div id="recaptcha-container"></div>
        <button class="btn-primary" id="sendSmsBtn" onclick="sendSms()">인증번호 받기</button>
        <button class="btn-back" onclick="goScreen(1)">← 이전으로</button>
      </div>

      <!-- OTP 입력 -->
      <div id="otpArea" style="display:none;">
        <div class="sms-sent-badge">
          📨 <span id="sentPhoneDisplay"></span>으로 인증번호를 발송했습니다.
        </div>

        <div class="otp-wrap">
          <input class="otp-input" type="tel" maxlength="1" id="otp0" oninput="otpInput(0)" onkeydown="otpKey(event,0)">
          <input class="otp-input" type="tel" maxlength="1" id="otp1" oninput="otpInput(1)" onkeydown="otpKey(event,1)">
          <input class="otp-input" type="tel" maxlength="1" id="otp2" oninput="otpInput(2)" onkeydown="otpKey(event,2)">
          <input class="otp-input" type="tel" maxlength="1" id="otp3" oninput="otpInput(3)" onkeydown="otpKey(event,3)">
          <input class="otp-input" type="tel" maxlength="1" id="otp4" oninput="otpInput(4)" onkeydown="otpKey(event,4)">
          <input class="otp-input" type="tel" maxlength="1" id="otp5" oninput="otpInput(5)" onkeydown="otpKey(event,5)">
        </div>

        <div class="timer-row">
          <span style="color:var(--muted);font-size:13px;">인증번호 유효시간</span>
          <span class="timer" id="timerDisplay">03:00</span>
        </div>

        <button class="btn-primary" id="verifyBtn" onclick="verifyOtp()">인증 확인</button>

        <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted);">
          번호를 받지 못하셨나요?
          <button class="resend-btn" id="resendBtn" onclick="resendSms()" disabled>재발송 (30s)</button>
        </div>
        <button class="btn-back" onclick="backToPhone()">← 번호 다시 입력</button>
      </div>
    </div>

    <!-- ── STEP 3: 완료 ── -->
    <div class="screen" id="screen3">
      <div class="success-wrap">
        <div class="success-icon">🎉</div>
        <div class="verified-badge">✅ 본인 인증 완료</div>
        <div class="success-title">로그인 완료!</div>
        <div class="success-sub">Partner Pool에 오신 것을 환영합니다.<br>잠시 후 페이지가 이동됩니다...</div>
        <button class="btn-primary" onclick="goDestination()" style="max-width:260px;margin:0 auto;display:block;">
          바로 이동하기 →
        </button>
      </div>
    </div>

  </div><!-- /card -->

  <div class="bottom-link">
    계정이 없으신가요? <a href="#" onclick="goSignup()">회원가입하기 →</a>
  </div>
</div>

<script>
/* ── URL 파라미터 ── */
const params = new URLSearchParams(location.search);
const dest   = params.get('dest'); // 'club' | 'corp'

function getDestUrl() {
  if (dest === 'club') return '학생단체 등록.html';
  if (dest === 'corp') return '기업 등록.html';
  return 'partnerpool.html';
}
function goSignup()      { location.href = '회원가입.html' + (dest ? '?dest='+dest : ''); }
function goDestination() { location.href = getDestUrl(); }

/* ── 스텝 전환 ── */
function goScreen(n) {
  document.querySelectorAll('.screen').forEach((s,i) => {
    s.classList.toggle('active', i === n-1);
  });
  // 인디케이터
  for (let i=1; i<=3; i++) {
    const dot = document.getElementById('sd'+i);
    const lbl = document.getElementById('slb'+i);
    if (i < n)       { dot.classList.add('done');   dot.classList.remove('active'); }
    else if (i === n){ dot.classList.add('active'); dot.classList.remove('done');  }
    else             { dot.classList.remove('active','done'); }
    lbl && lbl.classList.toggle('active', i===n);
  }
  for (let i=1; i<=2; i++) {
    document.getElementById('sl'+i).classList.toggle('done', i < n);
  }
}

/* ── 유틸 ── */
function v(id)         { const el=document.getElementById(id); return el?el.value.trim():''; }
function showErr(boxId,msg){ const el=document.getElementById(boxId); el.textContent=msg; el.style.display='block'; }
function clearErr(boxId)   { document.getElementById(boxId).style.display='none'; }
function setLoading(btnId,on,text='') {
  const btn=document.getElementById(btnId);
  btn.disabled=on;
  btn.innerHTML = on ? `<span class="spinner"></span>${text||'처리 중...'}` : btn.dataset.orig || btn.textContent;
  if (!on && btn.dataset.orig) btn.textContent=btn.dataset.orig;
}

/* ── STEP 1: 로그인 ── */
function login() {
  clearErr('errBox1');
  const email=v('email'), pw=v('password');
  if (!email){ document.getElementById('emailErr').textContent='이메일을 입력해주세요.'; return; }
  if (!pw)   { document.getElementById('pwErr').textContent='비밀번호를 입력해주세요.'; return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>로그인 중...';

  if (window.fbAuth) {
    window.fbAuth.signInWithEmailAndPassword(email, pw)
      .then(() => goScreen(2))
      .catch(e => {
        btn.disabled=false; btn.textContent='로그인';
        const msgs = {
          'auth/user-not-found':'등록되지 않은 이메일입니다.',
          'auth/wrong-password':'비밀번호가 올바르지 않습니다.',
          'auth/invalid-email':'올바른 이메일 형식이 아닙니다.',
          'auth/too-many-requests':'너무 많은 시도입니다. 잠시 후 다시 시도해주세요.',
          'auth/invalid-credential':'이메일 또는 비밀번호를 확인해주세요.',
        };
        showErr('errBox1', msgs[e.code] || '로그인 중 오류: '+e.message);
      });
  } else {
    // 폴백 (Firebase 미연동)
    setTimeout(() => { btn.disabled=false; btn.textContent='로그인'; goScreen(2); }, 600);
  }
}

function loginWithGoogle() {
  if (window.fbAuth && window.GoogleAuthProvider) {
    const provider = new window.GoogleAuthProvider();
    window.fbAuth.signInWithPopup(provider)
      .then(() => goScreen(2))
      .catch(e => showErr('errBox1','Google 로그인 실패: '+e.message));
  } else {
    goScreen(2); // 폴백
  }
}

function resetPw() {
  const email = v('email');
  if (!email){ document.getElementById('emailErr').textContent='이메일을 먼저 입력해주세요.'; return; }
  if (window.fbAuth) {
    window.fbAuth.sendPasswordResetEmail(email)
      .then(() => alert('비밀번호 재설정 이메일을 발송했습니다.'))
      .catch(() => alert('이메일 전송 실패. 이메일을 확인해주세요.'));
  } else {
    alert('Firebase 연동 후 사용 가능합니다.');
  }
}

/* ── STEP 2: 전화 인증 ── */
let confirmationResult = null;
let timerInterval = null;
let resendTimer = null;

function formatPhone(input) {
  let val = input.value.replace(/\D/g,'');
  if (val.length > 11) val = val.slice(0,11);
  if (val.length > 7) val = val.slice(0,3)+'-'+val.slice(3,7)+'-'+val.slice(7);
  else if (val.length > 3) val = val.slice(0,3)+'-'+val.slice(3);
  input.value = val;
}

function getE164Phone() {
  const raw = v('phoneNum').replace(/\D/g,'');
  if (raw.startsWith('0')) return '+82' + raw.slice(1);
  return '+82' + raw;
}

function sendSms() {
  clearErr('errBox2');
  const phone = v('phoneNum').replace(/\D/g,'');
  if (phone.length < 10) {
    document.getElementById('phoneErr').textContent = '올바른 휴대폰 번호를 입력해주세요.';
    return;
  }

  const btn = document.getElementById('sendSmsBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>발송 중...';

  if (window.fbAuth && window.RecaptchaVerifier) {
    // ── Firebase Phone Auth ──
    try {
      if (!window.appVerifier) {
        window.appVerifier = new window.RecaptchaVerifier('recaptcha-container', { size:'invisible' }, window.fbAuth);
      }
      window.fbAuth.signInWithPhoneNumber(getE164Phone(), window.appVerifier)
        .then(result => {
          confirmationResult = result;
          btn.disabled=false; btn.textContent='인증번호 받기';
          showOtpArea();
        })
        .catch(e => {
          btn.disabled=false; btn.textContent='인증번호 받기';
          showErr('errBox2','SMS 발송 실패: '+e.message);
          if (window.appVerifier) { window.appVerifier.clear(); window.appVerifier=null; }
        });
    } catch(e) {
      btn.disabled=false; btn.textContent='인증번호 받기';
      showErr('errBox2','오류: '+e.message);
    }
  } else {
    // ── 폴백: 모의 인증 (테스트용) ──
    setTimeout(() => {
      btn.disabled=false; btn.textContent='인증번호 받기';
      // 테스트용 고정 코드 123456
      window._mockOtp = '123456';
      showOtpArea();
    }, 800);
  }
}

function showOtpArea() {
  document.getElementById('phoneInputArea').style.display = 'none';
  document.getElementById('otpArea').style.display = 'block';
  document.getElementById('sentPhoneDisplay').textContent = v('phoneNum');
  document.getElementById('otp0').focus();
  startTimer(180); // 3분
  startResendCooldown(30);
}

function backToPhone() {
  document.getElementById('otpArea').style.display = 'none';
  document.getElementById('phoneInputArea').style.display = 'block';
  clearOtp(); stopTimer();
}

/* OTP 입력 자동 포커스 */
function otpInput(idx) {
  const el = document.getElementById('otp'+idx);
  el.classList.toggle('filled', el.value !== '');
  if (el.value && idx < 5) document.getElementById('otp'+(idx+1)).focus();
  // 6자리 다 입력되면 자동 확인
  const code = getOtp();
  if (code.length === 6) verifyOtp();
}
function otpKey(e, idx) {
  if (e.key==='Backspace' && !document.getElementById('otp'+idx).value && idx>0)
    document.getElementById('otp'+(idx-1)).focus();
}
function getOtp() {
  return [0,1,2,3,4,5].map(i=>document.getElementById('otp'+i).value).join('');
}
function clearOtp() {
  [0,1,2,3,4,5].forEach(i=>{ const el=document.getElementById('otp'+i); el.value=''; el.classList.remove('filled'); });
}

function verifyOtp() {
  const code = getOtp();
  if (code.length < 6) { showErr('errBox2','인증번호 6자리를 모두 입력해주세요.'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>확인 중...';
  clearErr('errBox2');

  if (confirmationResult) {
    // Firebase 실제 인증
    confirmationResult.confirm(code)
      .then(() => { stopTimer(); goScreen(3); setTimeout(goDestination, 2500); })
      .catch(e => {
        btn.disabled=false; btn.textContent='인증 확인';
        const msgs = { 'auth/invalid-verification-code':'인증번호가 올바르지 않습니다.', 'auth/code-expired':'인증번호가 만료됐습니다. 재발송해주세요.' };
        showErr('errBox2', msgs[e.code] || '인증 실패: '+e.message);
        clearOtp(); document.getElementById('otp0').focus();
      });
  } else {
    // 폴백 모의 인증
    setTimeout(() => {
      if (code === (window._mockOtp || '123456')) {
        stopTimer(); goScreen(3); setTimeout(goDestination, 2500);
      } else {
        btn.disabled=false; btn.textContent='인증 확인';
        showErr('errBox2','인증번호가 올바르지 않습니다. (테스트: 123456)');
        clearOtp(); document.getElementById('otp0').focus();
      }
    }, 600);
  }
}

function resendSms() { backToPhone(); }

/* 타이머 */
function startTimer(seconds) {
  stopTimer();
  let remain = seconds;
  timerInterval = setInterval(() => {
    remain--;
    const m = String(Math.floor(remain/60)).padStart(2,'0');
    const s = String(remain%60).padStart(2,'0');
    document.getElementById('timerDisplay').textContent = m+':'+s;
    if (remain <= 0) {
      stopTimer();
      document.getElementById('timerDisplay').textContent = '만료됨';
      document.getElementById('timerDisplay').style.color = 'var(--muted)';
      document.getElementById('verifyBtn').disabled = true;
      showErr('errBox2','인증번호가 만료됐습니다. 재발송해주세요.');
    }
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

function startResendCooldown(sec) {
  const btn = document.getElementById('resendBtn');
  btn.disabled=true; let t=sec;
  resendTimer = setInterval(() => {
    t--;
    btn.textContent = `재발송 (${t}s)`;
    if (t<=0) { clearInterval(resendTimer); btn.disabled=false; btn.textContent='재발송'; }
  }, 1000);
}
</script>
